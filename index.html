<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Palantir — Webcams Live</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#0d1117; color:#e6edf3; padding:14px; min-height:100vh; }
  .header { text-align:center; margin-bottom:18px; }
  .header h1 { font-size:26px; letter-spacing:1px;
    background:linear-gradient(135deg,#58a6ff,#36c5f0);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .header p { font-size:12px; color:#8b949e; margin-top:4px; }
  .controls { display:flex; gap:8px; justify-content:center; margin-bottom:18px; flex-wrap:wrap; }
  .btn { padding:7px 15px; border:1px solid #30363d; background:#161b22; color:#8b949e;
    border-radius:20px; cursor:pointer; font-size:12px; transition:.2s; font-weight:500; }
  .btn:hover,.btn.active { background:#1f6feb; color:#fff; border-color:#1f6feb; }
  .section-title { font-size:13px; font-weight:600; color:#58a6ff; margin:22px 0 10px;
    text-transform:uppercase; letter-spacing:1.5px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:14px; }
  @media (max-width:700px){ .grid{ grid-template-columns:1fr; } }
  .card { background:#161b22; border:1px solid #30363d; border-radius:12px; overflow:hidden; transition:.2s; }
  .card:hover { border-color:#58a6ff; }
  .frame { position:relative; width:100%; aspect-ratio:16/9; background:#000; }
  .frame iframe { width:100%; height:100%; border:0; display:block; }
  .meta { padding:11px 13px; display:flex; justify-content:space-between; align-items:center; }
  .meta .name { font-size:14px; font-weight:600; }
  .meta .name span { color:#8b949e; font-weight:400; font-size:12px; }
  .tag { font-size:9px; padding:2px 6px; border-radius:4px; font-weight:600; letter-spacing:.5px; }
  .tag.ok { background:rgba(63,185,80,.15); color:#3fb950; }
  .tag.test { background:rgba(210,153,34,.15); color:#d29922; }
  .foot { text-align:center; margin-top:26px; font-size:11px; color:#484f58; line-height:1.7; }
</style>
</head>
<body>
  <div class="header">
    <h1>◉ MINI PALANTIR</h1>
    <p>Tes lieux, en direct, sur une seule page</p>
  </div>

  <div class="controls">
    <button class="btn active" data-f="all">Tous</button>
    <button class="btn" data-f="cote">🌊 Côtes</button>
    <button class="btn" data-f="montagne">⛰️ Montagne</button>
    <button class="btn" data-f="ville">🏙️ Villes</button>
  </div>

  <div id="app"></div>

  <div class="foot">
    🟢 confirmé (Viewsurf / Skaping) · 🟠 à vérifier (Vision-Environnement)<br>
    Touche une vue pour le plein écran
  </div>

<script>
const CAMS = [
  // CÔTES
  { city:"Arcachon", view:"Jetée Thiers — le Bassin", zone:"cote", status:"ok",
    url:"https://pv.viewsurf.com/1242/Arcachon-Jetee-Thiers-Live" },
  { city:"Arcachon", view:"Panoramique HD", zone:"cote", status:"ok",
    url:"https://pv.viewsurf.com/566/Arcachon-Jetee-Thiers-Panoramique-HD" },
  { city:"Arcachon", view:"Le Port", zone:"cote", status:"ok",
    url:"https://pv.viewsurf.com/2166/Port-d-Arcachon" },
  { city:"Saint-Malo", view:"Les Thermes Marins — le Sillon", zone:"cote", status:"test",
    url:"https://www.vision-environnement.com/live/player/V3/stmalo4/live.php" },
  { city:"Nice", view:"Promenade des Anglais", zone:"cote", status:"ok",
    url:"https://pv.viewsurf.com/2274/Nice-promenade-des-anglais?i=Nzk5Mjo" },
  { city:"Cassis", view:"Côté Mer", zone:"cote", status:"ok",
    url:"https://pv.viewsurf.com/1924/Cassis" },
  { city:"Cassis", view:"Le Port", zone:"cote", status:"ok",
    url:"https://pv.viewsurf.com/2076/Port-de-Cassis" },
  // MONTAGNE
  { city:"Megève", view:"Place du Village", zone:"montagne", status:"ok",
    url:"https://www.skaping.com/megeve/village" },
  { city:"Val Thorens", view:"La Station", zone:"montagne", status:"ok",
    url:"https://www.skaping.com/valthorens/station" },
  // VILLES
  { city:"Toulouse", view:"La Garonne — le Bazacle", zone:"ville", status:"test",
    url:"https://www.vision-environnement.com/live/player/V3/toulouse/live.php" }
];

const ZONES = [
  { key:"cote", label:"🌊 Côtes" },
  { key:"montagne", label:"⛰️ Montagne" },
  { key:"ville", label:"🏙️ Villes" }
];

let filter = "all";

function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";
  ZONES.forEach(z=>{
    const list = CAMS.filter(c=>c.zone===z.key && (filter==="all"||filter===z.key));
    if(!list.length) return;
    const sec = document.createElement("div");
    sec.innerHTML = `<div class="section-title">${z.label}</div>
      <div class="grid">${list.map(c=>`
        <div class="card">
          <div class="frame"><iframe src="${c.url}" allowfullscreen loading="lazy"></iframe></div>
          <div class="meta">
            <span class="name">${c.city} <span>· ${c.view}</span></span>
            <span class="tag ${c.status}">${c.status==='ok'?'LIVE':'TEST'}</span>
          </div>
        </div>`).join("")}</div>`;
    app.appendChild(sec);
  });
}

document.querySelectorAll(".btn").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll(".btn").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    filter = b.dataset.f;
    render();
  });
});

render();
</script>
</body>
</html>
