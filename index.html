<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Palantir — Webcams Live</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#0d1117; color:#e6edf3; padding:14px; min-height:100vh;
  }
  .header { text-align:center; margin-bottom:18px; }
  .header h1 {
    font-size:26px; letter-spacing:1px;
    background:linear-gradient(135deg,#58a6ff,#36c5f0);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .header p { font-size:12px; color:#8b949e; margin-top:4px; }
  .section-title {
    font-size:13px; font-weight:600; color:#58a6ff; margin:22px 0 10px;
    text-transform:uppercase; letter-spacing:1.5px;
  }
  .grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:14px;
  }
  @media (max-width:700px){ .grid{ grid-template-columns:1fr; } }
  .card {
    background:#161b22; border:1px solid #30363d; border-radius:12px;
    overflow:hidden; transition:.2s;
  }
  .card:hover { border-color:#58a6ff; }
  .frame { position:relative; width:100%; aspect-ratio:16/9; background:#000; }
  .frame iframe { width:100%; height:100%; border:0; display:block; }
  .meta { padding:11px 13px; }
  .meta .name { font-size:14px; font-weight:600; }
  .meta .name span { color:#8b949e; font-weight:400; font-size:12px; }
  .foot { text-align:center; margin-top:26px; font-size:11px; color:#484f58; line-height:1.7; }
  .foot a { color:#58a6ff; }
</style>
</head>
<body>
  <div class="header">
    <h1>◉ MINI PALANTIR</h1>
    <p>Tes lieux, en direct, sur une seule page</p>
  </div>

  <div id="app"></div>

  <div class="foot">
    Flux live via le réseau Viewsurf · vidéo en temps réel<br>
    Touche une vue pour le plein écran
  </div>

<script>
const CAMS = [
  { city:"Arcachon", view:"Jetée Thiers — le Bassin", zone:"cote",
    url:"https://pv.viewsurf.com/1242/Arcachon-Jetee-Thiers-Live" },
  { city:"Arcachon", view:"Panoramique HD", zone:"cote",
    url:"https://pv.viewsurf.com/566/Arcachon-Jetee-Thiers-Panoramique-HD" },
  { city:"Arcachon", view:"Le Port", zone:"cote",
    url:"https://pv.viewsurf.com/2166/Port-d-Arcachon" },
  { city:"Nice", view:"Promenade des Anglais", zone:"cote",
    url:"https://pv.viewsurf.com/2274/Nice-promenade-des-anglais?i=Nzk5Mjo" },
  { city:"Cassis", view:"Côté Mer", zone:"cote",
    url:"https://pv.viewsurf.com/1924/Cassis" },
  { city:"Cassis", view:"Le Port", zone:"cote",
    url:"https://pv.viewsurf.com/2076/Port-de-Cassis" }
];

const ZONES = [ { key:"cote", label:"🌊 Côtes" } ];

function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";
  ZONES.forEach(z=>{
    const list = CAMS.filter(c=>c.zone===z.key);
    if(!list.length) return;
    const sec = document.createElement("div");
    sec.innerHTML = `<div class="section-title">${z.label}</div>
      <div class="grid">${list.map(c=>`
        <div class="card">
          <div class="frame">
            <iframe src="${c.url}" allowfullscreen loading="lazy"></iframe>
          </div>
          <div class="meta">
            <span class="name">${c.city} <span>· ${c.view}</span></span>
          </div>
        </div>`).join("")}</div>`;
    app.appendChild(sec);
  });
}
render();
</script>
</body>
</html>
